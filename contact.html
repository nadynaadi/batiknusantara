<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dibatik Nusantara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav>
        <h1>Dibatik</h1>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="konten.html">Konten</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    
    <section class="page-section contact"> 
        <form>
            <h2>Kontak Kami</h2>
            <input type="text" placeholder="Nama Lengkap" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Pesan Anda..." rows="5" required></textarea>
            <input type="submit" value="Kirim Pesan">
        </form>
    </section>


    
    <footer class="bg-gradient-to-r from-orange-900 to-black text-white py-8 mt-20">
        <div class="max-w-4xl mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-8 mb-4">
                <div>
                    <h3 class="text-xl font-bold mb-2">Dibatik Nusantara</h3>
                    <p>Warisan budaya yang tetap relevan dengan gaya masa kini</p>
                </div>
                <div class="text-right md:text-left">
                    <p>© Dibatik Nusantara </p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Pesan berhasil dikirim! Terima kasih ');
            this.reset();
        });

        document.querySelectorAll('nav a').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
